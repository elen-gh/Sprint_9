name: Selenoid Tests Workflow

on:
  push:
    branches:
      - develop

jobs:
  run-selenoid-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3

      - name: Print project tree
        run: |
          sudo apt-get install -y tree
          tree .

      - name: Pre-download Chrome image
        run: |
          docker pull selenoid/chrome:128.0

      - name: Start Selenoid infrastructure
        run: |
          docker compose up -d selenoid selenoid-ui

      - name: Wait for Selenoid readiness
        run: |
          echo "Waiting 15 seconds for Selenoid to spin up..."
          sleep 15

      - name: Run infrastructure and tests
        run: |
          docker compose up --build --exit-code-from test

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
